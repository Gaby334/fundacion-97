<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos - Fundación 97</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2E86AB",
                        "primary-dark": "#0D3B66",
                        "secondary": "#F8B27A",
                        "accent": "#F28F3B",
                        "background-light": "#FAF0CA",
                        "surface-light": "#FFF8F0",
                        "deep-blue": "#0D3B66",
                        "trust-blue": "#2E86AB",
                        "light-blue": "#A3CEF1",
                        "warm-orange": "#F28F3B",
                        "soft-orange": "#F8B27A",
                        "warm-beige": "#FAF0CA",
                        "off-white": "#FFF8F0",
                        "dark-gray": "#1C2A38",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "mono": ["ui-monospace", "SFMono-Regular", "Menlo", "Monaco", "Consolas", "monospace"]
                    }
                }
            }
        }
    </script>
    
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background-color: #e2e8f0;
            border-radius: 20px;
        }
    </style>
</head>

<body class="bg-background-light text-slate-800 font-display min-h-screen flex overflow-hidden">
    
    <!-- Sidebar se inyectará aquí por NavigationManager -->

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        
        <!-- Top Header -->
        <header class="h-16 bg-surface-light border-b border-slate-200 flex items-center justify-between px-6 shrink-0 z-10">
            <div class="flex items-center gap-2 text-slate-500">
                <span class="material-symbols-outlined text-xl">map</span>
                <span class="text-slate-300">/</span>
                <span class="text-sm font-medium text-slate-900">Proyectos</span>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="networkStatus" class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-slate-100 text-slate-600 rounded-full border border-slate-200">
                    <div class="size-2 rounded-full bg-slate-400"></div>
                    <span class="text-xs font-bold">No conectado</span>
                </div>
                
                <div class="h-8 w-[1px] bg-slate-200 mx-1"></div>
                
                <div class="flex items-center gap-3">
                    <button id="connectWallet" class="flex items-center gap-2 pl-3 pr-2 py-1.5 bg-primary hover:bg-primary-dark transition-colors rounded-lg text-white shadow-lg shadow-primary/20">
                        <span class="material-symbols-outlined text-lg">account_balance_wallet</span>
                        <span class="text-sm font-bold">Conectar</span>
                    </button>
                </div>
            </div>
        </header>

        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto custom-scroll">
    <section class="py-16 px-6 bg-gradient-to-br from-primary to-primary-dark text-white">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-5xl font-bold mb-4">Proyectos Activos</h1>
            <p class="text-xl text-primary-100 max-w-2xl mx-auto mb-8">
                Cada proyecto está verificado en blockchain y con impacto medible en tiempo real
            </p>
            
            <!-- Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-4xl mx-auto">
                <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
                    <div class="text-3xl font-bold" id="totalProjects">-</div>
                    <div class="text-sm text-primary-100">Proyectos</div>
                </div>
                <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
                    <div class="text-3xl font-bold" id="totalRaised">-</div>
                    <div class="text-sm text-primary-100">Recaudado</div>
                </div>
                <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
                    <div class="text-3xl font-bold" id="totalDonors">-</div>
                    <div class="text-sm text-primary-100">Donantes</div>
                </div>
                <div class="bg-white/10 backdrop-blur-md rounded-xl p-4">
                    <div class="text-3xl font-bold">97%</div>
                    <div class="text-sm text-primary-100">Transparencia</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Filters -->
    <section class="py-8 px-6 bg-white border-b border-slate-200 sticky top-[72px] z-40">
        <div class="max-w-7xl mx-auto">
            <div class="flex flex-wrap gap-3 justify-center">
                <button onclick="filterProjects('all')" class="filter-btn bg-primary text-white px-6 py-2 rounded-full font-semibold transition-all">
                    Todos
                </button>
                <button onclick="filterProjects('agua')" class="filter-btn bg-slate-200 text-slate-700 hover:bg-slate-300 px-6 py-2 rounded-full font-semibold transition-all">
                    <span class="material-symbols-outlined text-sm mr-1">water_drop</span>
                    Agua
                </button>
                <button onclick="filterProjects('educacion')" class="filter-btn bg-slate-200 text-slate-700 hover:bg-slate-300 px-6 py-2 rounded-full font-semibold transition-all">
                    <span class="material-symbols-outlined text-sm mr-1">school</span>
                    Educación
                </button>
                <button onclick="filterProjects('salud')" class="filter-btn bg-slate-200 text-slate-700 hover:bg-slate-300 px-6 py-2 rounded-full font-semibold transition-all">
                    <span class="material-symbols-outlined text-sm mr-1">medical_services</span>
                    Salud
                </button>
                <button onclick="filterProjects('medioambiente')" class="filter-btn bg-slate-200 text-slate-700 hover:bg-slate-300 px-6 py-2 rounded-full font-semibold transition-all">
                    <span class="material-symbols-outlined text-sm mr-1">eco</span>
                    Medio Ambiente
                </button>
            </div>
        </div>
    </section>

    <!-- Projects Grid -->
    <section class="py-12 px-6">
        <div class="max-w-7xl mx-auto">
            <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Los proyectos se cargarán aquí dinámicamente -->
            </div>
            
            <!-- Loading State -->
            <div id="loadingState" class="text-center py-16">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-primary border-t-transparent mb-4"></div>
                <p class="text-slate-500 font-semibold">Cargando proyectos...</p>
            </div>
            
            <!-- Empty State -->
            <div id="emptyState" class="hidden text-center py-16">
                <span class="material-symbols-outlined text-6xl text-slate-300 mb-4">search_off</span>
                <p class="text-slate-500 text-lg font-semibold">No se encontraron proyectos</p>
            </div>
        </div>
    </section>

        </div>
    </main>

    <!-- Scripts -->
    <script src="../js/navigation.js"></script>
    <script src="../js/blockchain.js"></script>
    <script src="../js/donations.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/projects-loader.js"></script>
    <script src="../js/tailwind-config.js"></script>
    
    <script>
        // Cargar proyectos con todas las opciones (sin límite, con filtros)
        document.addEventListener('DOMContentLoaded', () => {
            ProjectsLoader.init({
                limit: null,              // Sin límite - mostrar todos
                featured: false,          // No solo destacados
                containerSelector: '#projectsGrid',
                showFilters: true,
                showStats: true,
                dataPath: '../data/proyectos.json'
            });

            // Configurar botones de filtro
            setupFilterButtons();
        });

        // Configurar listeners en botones de filtro
        function setupFilterButtons() {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const category = btn.getAttribute('data-filter');
                    
                    // Actualizar estado visual
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('bg-primary', 'text-white');
                        b.classList.add('bg-slate-200', 'text-slate-700');
                    });
                    btn.classList.add('bg-primary', 'text-white');
                    btn.classList.remove('bg-slate-200', 'text-slate-700');
                    
                    // Filtrar
                    ProjectsLoader.filterProjects(category);
                });
            });
        }

        // Conectar wallet
        const connectBtn = document.getElementById('connectWallet');
        if (connectBtn) {
            connectBtn.addEventListener('click', async () => {
                try {
                    const tracker = new BlockchainTracker();
                    await tracker.init();
                    const wallet = await tracker.connectWallet();
                    connectBtn.innerHTML = `
                        <span class="material-symbols-outlined text-lg icon-filled">check_circle</span>
                        <span class="text-sm font-bold">${wallet.address.substring(0, 6)}...</span>
                    `;
                } catch (error) {
                    console.error('Error conectando wallet:', error);
                }
            });
        }
    </script>
</body>
</html>
